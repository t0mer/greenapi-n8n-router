name: Docker Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (leave blank to auto-compute YYYY.M.PATCH)"
        required: false

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            TODAY="$(date +%Y.%-m)"
            LATEST="$(git tag --list "${TODAY}.*" 2>/dev/null | sort -V | tail -1)"
            if [ -z "$LATEST" ]; then VERSION="${TODAY}.0";
            else PATCH="${LATEST##*.}"; VERSION="${TODAY}.$((PATCH + 1))"; fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            techblog/greenapi-n8n-router:latest
            techblog/greenapi-n8n-router:${{ steps.version.outputs.version }}
